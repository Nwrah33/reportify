services:
  - type: web
    name: reportify-backend
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reportify-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 7d
      - key: FRONTEND_URL
        value: https://reportify-frontend.vercel.app
      - key: PORT
        value: 4000

databases:
  - name: reportify-db
    databaseName: reportify
    plan: free
